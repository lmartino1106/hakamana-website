  <!-- H -->
  <text x="370" y="310"
    font-family="Georgia, serif"
    font-size="90" font-weight="700"
    fill="#C9293A">H</text>

  <!-- divider -->
  <line x1="468" y1="230" x2="468" y2="340" stroke="#C9293A" stroke-width="2"/>

  <!-- M -->
  <text x="490" y="310"
